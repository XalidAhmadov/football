name: Update predictions

# Regenerates the forecast from the latest international match results and pushes
# it. The push triggers Vercel to redeploy automatically. Runs every 2 days, and
# can be launched on demand from the Actions tab.
on:
  schedule:
    - cron: "0 5 */2 * *" # every 2 days at 05:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-predictions
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Rebuild Elo ratings + goals model
        run: python model.py

      - name: Simulate the tournament
        run: python tournament.py 20000

      - name: Sync data into the web app
        run: |
          mkdir -p web/data
          cp predictions.json ratings.json goals_model.json web/data/

      - name: Commit & push if the forecast changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add predictions.json ratings.json goals_model.json web/data/*.json
          if git diff --cached --quiet; then
            echo "No changes — match data is unchanged since last run."
          else
            git commit -m "chore: auto-update predictions ($(date -u +%Y-%m-%d))"
            git push
          fi
